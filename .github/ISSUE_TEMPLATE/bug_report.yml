name: Bug 报告
description: 报告可复现的功能、数据或界面问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 请勿粘贴 Token、Cookie、数据库连接串或私有仓库内容。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 浏览器、Node.js 版本、部署方式等；不要填写密钥。
  - type: checkboxes
    id: security
    attributes:
      label: 安全确认
      options:
        - label: 我确认报告中不包含密钥、Cookie 或私人数据。
          required: true
